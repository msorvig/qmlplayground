<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QML Playground</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/gruvbox-dark.min.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #playground {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="playground"></div>

    <script type="module">
        import { QmlPlayground } from './qmlplayground.js';
        const playground = new QmlPlayground(document.getElementById('playground'));
        await playground.init();
    </script>
</body>
</html>
